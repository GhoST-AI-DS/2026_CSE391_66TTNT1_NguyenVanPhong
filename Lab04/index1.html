<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng Điểm Sinh Viên - Bài 1.1</title>
    <link rel="stylesheet" href="css1.css" />
  </head>
  <body>
    <h2>Quản lý điểm sinh viên</h2>

    <div class="input-group">
      <input type="text" id="fullname" placeholder="Họ và tên" />
      <input
        type="number"
        id="score"
        placeholder="Điểm (0-10)"
        min="0"
        max="10"
        step="0.1"
      />
      <button id="btnAdd">Thêm</button>
    </div>

    <table id="studentTable">
      <thead>
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th>Điểm</th>
          <th>Xếp loại</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div id="stats"></div>

    <script src="script1.js"></script>
  </body>
</html>
