<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng Điểm Sinh Viên - Bài 1.2</title>
    <link rel="stylesheet" href="css2.css" />
  </head>
  <body>
    <h2>Quản lý Điểm Sinh Viên</h2>

    <div class="controls">
      <div class="input-group">
        <input type="text" id="fullName" placeholder="Họ và tên" required />
        <input
          type="number"
          id="score"
          min="0"
          max="10"
          step="0.1"
          placeholder="Điểm (0-10)"
          required
        />
        <button id="addBtn">Thêm</button>
      </div>

      <div class="filter-group">
        <input type="text" id="searchInput" placeholder="Tìm theo họ tên..." />
        <select id="filterRank">
          <option value="all">Tất cả xếp loại</option>
          <option value="Giỏi">Giỏi</option>
          <option value="Khá">Khá</option>
          <option value="Trung bình">Trung bình</option>
          <option value="Yếu">Yếu</option>
        </select>
      </div>
    </div>

    <table id="studentTable">
      <thead>
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th id="scoreHeader" class="sortable">
            Điểm <span class="sort-arrow"></span>
          </th>
          <th>Xếp loại</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody id="studentBody"></tbody>
    </table>

    <div id="summary">
      Tổng số sinh viên: <span id="totalStudents">0</span> | Điểm trung bình:
      <span id="avgScore">0.0</span>
    </div>

    <div
      id="noResult"
      style="display: none; text-align: center; color: #888; margin-top: 20px"
    >
      Không có kết quả phù hợp
    </div>

    <script src="script2.js"></script>
  </body>
</html>
